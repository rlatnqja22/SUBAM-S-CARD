<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>법인카드 예약 관리 | Smart Concierge</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ══════════════════════════════════════════════
     TAILWIND 커스텀 테마 (네이비/화이트 비즈니스 톤)
     ══════════════════════════════════════════════ -->
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        // Primary 네이비 컬러 팔레트
        navy: {
          50:  '#f0f5ff',
          100: '#e0eaff',
          200: '#c7d6fe',
          300: '#a5b8fc',
          400: '#8193f8',
          500: '#6370f0',
          600: '#4e55e2',
          700: '#4142c6',
          800: '#1e3a8a',
          900: '#172554',
          950: '#0c1e4a',
        },
        surface: { 0:'#ffffff', 1:'#f8fafc', 2:'#f1f5f9', 3:'#e2e8f0', 4:'#cbd5e1' },
        ink: { 1:'#0f172a', 2:'#334155', 3:'#64748b', 4:'#94a3b8', 5:'#cbd5e1' },
      },
      fontFamily: {
        sans: ['"Noto Sans KR"','-apple-system','BlinkMacSystemFont','system-ui','sans-serif']
      }
    }
  }
}
</script>

<style>
  /* ── 기본 스타일 ───────────────────────────── */
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #f1f5f9;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* ── 애니메이션 ─────────────────────────────── */
  .fade-in { animation: fadeIn .3s ease; }
  .slide-up { animation: slideUp .35s cubic-bezier(.23,1,.32,1); }
  .scale-in { animation: scaleIn .25s cubic-bezier(.23,1,.32,1); }
  .slide-in-right { animation: slideInR .35s cubic-bezier(.23,1,.32,1); }
  .slide-in-bottom { animation: slideInB .4s cubic-bezier(.23,1,.32,1); }
  .pop-in { animation: popIn .35s cubic-bezier(.34,1.56,.64,1); }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes scaleIn { from{opacity:0;transform:scale(.96)} to{opacity:1;transform:scale(1)} }
  @keyframes slideInR { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
  @keyframes slideInB { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  @keyframes popIn { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }

  /* ── 글래스/카드 효과 ──────────────────────── */
  .glass {
    background: rgba(255,255,255,.82);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .card-el { transition: all .2s cubic-bezier(.23,1,.32,1); }
  .card-el:hover { transform: translateY(-1px); box-shadow: 0 4px 24px rgba(15,23,42,.08); }
  .card-el:active { transform: scale(.985); }
  .btn-apple { transition: all .15s ease; }
  .btn-apple:active { transform: scale(.97); opacity: .85; }

  /* ── 채팅 말풍선 ─────────────────────────── */
  .bubble-user {
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
    color: white;
    border-radius: 18px 18px 4px 18px;
  }
  .bubble-ai {
    background: #f1f5f9;
    color: #0f172a;
    border-radius: 18px 18px 18px 4px;
  }
  .bubble-system {
    background: #fef3c7;
    color: #78350f;
    border-radius: 12px;
  }

  /* ── 타이핑 인디케이터 ─────────────────── */
  .typing-dot {
    width: 7px; height: 7px; background: #94a3b8; border-radius: 50%;
    display: inline-block; margin: 0 1.5px;
    animation: typingBounce 1.3s infinite ease-in-out;
  }
  .typing-dot:nth-child(2) { animation-delay: .15s; }
  .typing-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: .4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── 녹음 중 펄스 ─────────────────────── */
  .recording-pulse {
    animation: recPulse 1.2s ease-in-out infinite;
  }
  @keyframes recPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.6); }
    50% { box-shadow: 0 0 0 12px rgba(239,68,68,0); }
  }

  /* ── 입력 요소 ────────────────────────── */
  input, select, textarea { font-family: inherit; }

  /* ── 채팅 패널 (모바일 대응) ─────────── */
  @media (max-width: 640px) {
    #chat-panel { width: 100vw !important; height: 100vh !important; bottom: 0 !important; right: 0 !important; border-radius: 0 !important; }
  }
</style>
</head>
<body>

<!-- 메인 앱 영역 -->
<div id="app"></div>

<!-- 토스트 알림 컨테이너 -->
<div id="toast-wrap" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-2"></div>

<!-- ═══════════════════════════════════════════════
     AI 채팅 플로팅 버튼 & 패널 (로그인 후에만 표시)
     ═══════════════════════════════════════════════ -->
<button id="chat-fab" onclick="toggleChat()" class="hidden fixed bottom-6 right-6 z-50 w-14 h-14 rounded-full bg-gradient-to-br from-navy-700 to-navy-900 shadow-xl shadow-navy-900/30 text-white flex items-center justify-center btn-apple hover:scale-105 transition-transform">
  <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
  </svg>
  <span class="absolute -top-1 -right-1 w-3 h-3 bg-emerald-400 rounded-full border-2 border-white"></span>
</button>

<div id="chat-panel" class="hidden fixed bottom-24 right-6 z-50 w-[380px] h-[600px] bg-white rounded-3xl shadow-2xl shadow-navy-900/20 border border-surface-3 overflow-hidden flex flex-col">
  <!-- 패널 헤더 -->
  <div class="px-5 py-4 border-b border-surface-3 bg-gradient-to-br from-navy-800 to-navy-900 text-white">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="relative">
          <div class="w-10 h-10 rounded-full bg-white/10 backdrop-blur flex items-center justify-center">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
          </div>
          <span class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-400 rounded-full border-2 border-navy-900"></span>
        </div>
        <div>
          <h3 class="font-bold text-[15px]">Smart Concierge</h3>
          <p class="text-[11px] text-navy-200">AI 예약 도우미 · Gemini</p>
        </div>
      </div>
      <div class="flex items-center gap-1">
        <button onclick="openApiKeySettings()" class="btn-apple p-2 hover:bg-white/10 rounded-xl transition" title="API 키 설정">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
        <button onclick="toggleChat()" class="btn-apple p-2 hover:bg-white/10 rounded-xl transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 메시지 리스트 영역 -->
  <div id="chat-messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-3 bg-surface-1"></div>

  <!-- 이미지 프리뷰 영역 (영수증 OCR 확장 포인트) -->
  <div id="image-preview" class="hidden px-4 pt-2 pb-0"></div>

  <!-- 입력 영역 -->
  <div class="border-t border-surface-3 bg-white p-3">
    <div class="flex items-end gap-2">
      <!-- 이미지 업로드 (영수증 OCR 준비) -->
      <button onclick="document.getElementById('image-input').click()" class="btn-apple shrink-0 w-9 h-9 rounded-full bg-surface-2 hover:bg-surface-3 text-ink-3 flex items-center justify-center transition" title="영수증 사진 업로드">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      </button>
      <input id="image-input" type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event)">

      <!-- 텍스트 입력 -->
      <div class="flex-1 relative">
        <textarea id="chat-input" rows="1" placeholder="예: 내일 오전 10시부터 2시간 카드 예약해줘"
          class="w-full resize-none px-4 py-2.5 pr-10 bg-surface-2 border-0 rounded-2xl text-[13px] focus:ring-2 focus:ring-navy-400 focus:outline-none transition placeholder:text-ink-5 max-h-[100px]"
          onkeydown="handleInputKey(event)"
          oninput="autoResize(this)"></textarea>
      </div>

      <!-- 음성 입력 (STT) -->
      <button id="mic-btn" onclick="toggleVoiceInput()" class="btn-apple shrink-0 w-9 h-9 rounded-full bg-surface-2 hover:bg-surface-3 text-ink-3 flex items-center justify-center transition" title="음성 입력">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
      </button>

      <!-- 전송 -->
      <button id="send-btn" onclick="sendChatMessage()" class="btn-apple shrink-0 w-9 h-9 rounded-full bg-gradient-to-br from-navy-700 to-navy-900 text-white flex items-center justify-center shadow-sm hover:shadow-md transition">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
      </button>
    </div>
    <p class="text-[10px] text-ink-4 mt-2 text-center">
      <svg class="w-3 h-3 inline -mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      예약 · 조회 · 취소를 자연어로 요청하세요
    </p>

</div>

<!-- ═══════════════════════════════════════════════
     API KEY 설정 모달
     ═══════════════════════════════════════════════ -->
<div id="api-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
  <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-7 scale-in">
    <div class="flex items-start gap-3 mb-5">
      <div class="w-10 h-10 rounded-2xl bg-navy-100 text-navy-700 flex items-center justify-center shrink-0">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
      </div>
      <div class="flex-1">
        <h3 class="text-[16px] font-bold text-ink-1">Gemini API 키 설정</h3>
        <p class="text-[12px] text-ink-3 mt-1">AI 채팅 기능을 사용하려면 Google AI Studio에서 발급받은 API 키를 입력해주세요. 키는 브라우저에만 저장됩니다.</p>
      </div>
    </div>
    <label class="block text-[12px] font-semibold text-ink-3 mb-2">API Key</label>
    <input id="api-key-input" type="password" placeholder="AIza..."
      class="w-full px-4 py-3 bg-surface-2 border-0 rounded-2xl text-[13px] focus:ring-2 focus:ring-navy-400 focus:outline-none transition font-mono">
    <div class="flex gap-2 mt-5">
      <button onclick="closeApiKeySettings()" class="btn-apple flex-1 py-3 rounded-2xl bg-surface-2 hover:bg-surface-3 text-ink-2 font-semibold text-[13px] transition">취소</button>
      <button onclick="saveApiKey()" class="btn-apple flex-1 py-3 rounded-2xl bg-gradient-to-b from-navy-700 to-navy-900 text-white font-semibold text-[13px] shadow-sm">저장</button>
    </div>
    <a href="https://aistudio.google.com/app/apikey" target="_blank" class="block text-center text-[11px] text-navy-600 hover:text-navy-800 mt-3 font-medium">API 키 발급받기 →</a>
  </div>
</div>

<script>
// ╔═══════════════════════════════════════════════════════════════╗
// ║  1. CONFIG  :  Gemini API 키는 localStorage에만 저장됩니다     ║
// ║                (하드코딩하지 마세요!)                          ║
// ╚═══════════════════════════════════════════════════════════════╝
let API_KEY = ''; // ← 여기는 항상 비워두고, UI에서 입력하세요.
const GEMINI_MODEL = 'gemini-2.0-flash'; // gemini-1.5-flash 로도 교체 가능
const GEMINI_URL = (key) => `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`;

// ╔═══════════════════════════════════════════════════════════════╗
// ║  2. DATA LAYER : localStorage 기반 영속 저장                   ║
// ╚═══════════════════════════════════════════════════════════════╝
const DB = {
  _k: k => `cc_${k}`,
  get(k) { try { return JSON.parse(localStorage.getItem(this._k(k))); } catch { return null; } },
  set(k, v) { localStorage.setItem(this._k(k), JSON.stringify(v)); },

  // 초기 시드 데이터 (첫 실행 시에만)
  init() {
    if (!this.get('cards')) this.set('cards', [
      { id:'C001', name:'법인카드 1', holder:'경영지원팀', last4:'4821', type:'Visa',       color:'#1e3a8a' },
      { id:'C002', name:'법인카드 2', holder:'마케팅팀',   last4:'7753', type:'Mastercard', color:'#0369a1' },
      { id:'C003', name:'법인카드 3', holder:'개발팀',     last4:'3390', type:'Visa',       color:'#0f766e' },
      { id:'C004', name:'법인카드 4', holder:'영업팀',     last4:'1567', type:'Mastercard', color:'#4338ca' },
    ]);
    if (!this.get('reservations')) this.set('reservations', []);
    if (!this.get('users')) this.set('users', {
      '1234': { name:'관리자', dept:'경영지원팀', role:'admin' },
      '5678': { name:'김민수', dept:'개발팀',     role:'user' },
      '9012': { name:'이영희', dept:'마케팅팀',   role:'user' },
      '3456': { name:'박철수', dept:'영업팀',     role:'user' },
    });

    // API 키는 localStorage 전용 키로 별도 저장 (cc_ 접두사 없음)
    const storedKey = localStorage.getItem('gemini_api_key');
    if (storedKey) API_KEY = storedKey;
  }
};
DB.init();

// ╔═══════════════════════════════════════════════════════════════╗
// ║  3. STATE : 클라이언트 사이드 상태                             ║
// ╚═══════════════════════════════════════════════════════════════╝
let S = {
  user: null,                           // 현재 로그인 사용자 { empId, name, dept, role }
  view: 'login',                        // login | user | admin
  userTab: 'cards',                     // cards | apply | history
  adminTab: 'requests',                 // requests | cards
  calendarCard: null,                   // 달력 뷰로 본 카드 ID
  calendarMonth: new Date().getMonth(),
  calendarYear: new Date().getFullYear(),
  applyCard: null,                      // 신청 폼 프리셋 카드 ID

  // 채팅 관련
  chatOpen: false,
  chatHistory: [],                      // { role: 'user'|'ai'|'system', text, time, action? }
  pendingImage: null,                   // 영수증 등 첨부 이미지 (base64)
  recognizing: false,                   // STT 녹음 중 여부
  recognition: null,                    // SpeechRecognition 인스턴스
};

const $ = sel => document.querySelector(sel);
const app = () => document.getElementById('app');

// ╔═══════════════════════════════════════════════════════════════╗
// ║  4. HELPERS                                                    ║
// ╚═══════════════════════════════════════════════════════════════╝

/** 상단 중앙 토스트 알림 */
function toast(msg, type='success') {
  const w = document.getElementById('toast-wrap');
  const colors = { success:'bg-emerald-500', error:'bg-red-500', info:'bg-navy-800' };
  const icons = {
    success:`<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>`,
    error:  `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>`,
    info:   `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/><path stroke-width="2" d="M12 16v-4m0-4h.01"/></svg>`,
  };
  const el = document.createElement('div');
  el.className = `${colors[type]} text-white px-5 py-3 rounded-2xl shadow-lg flex items-center gap-2.5 text-sm font-medium scale-in`;
  el.style.minWidth = '220px';
  el.innerHTML = `${icons[type]}<span>${msg}</span>`;
  w.appendChild(el);
  setTimeout(() => { el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 2500);
}

/** 특정 카드의 현재 상태(사용가능/예약됨/사용중) 계산 */
function getCardStatus(cid) {
  const now = new Date(), res = DB.get('reservations') || [];
  const active = res.find(r => r.cardId===cid && r.status==='approved' && new Date(r.startTime)<=now && new Date(r.endTime)>=now);
  if (active) return { status:'in-use', r:active };
  const up = res.find(r => r.cardId===cid && r.status==='approved' && new Date(r.startTime)>now);
  if (up) return { status:'reserved', r:up };
  return { status:'available', r:null };
}

/** 특정 시간 구간에 이미 예약/대기 중인 건이 있는지 검사 (중복 예약 방지) */
function hasConflict(cid, s, e, exId=null) {
  return (DB.get('reservations') || []).some(r => {
    if (r.cardId !== cid || r.id === exId) return false;
    if (r.status !== 'approved' && r.status !== 'pending') return false;
    return new Date(s) < new Date(r.endTime) && new Date(e) > new Date(r.startTime);
  });
}

/** 월 단위로 카드의 예약 내역 조회 (달력용) */
function getResForMonth(cid, year, month) {
  return (DB.get('reservations') || []).filter(r => {
    if (r.cardId !== cid || (r.status !== 'approved' && r.status !== 'pending')) return false;
    const rs = new Date(r.startTime), re = new Date(r.endTime);
    const ms = new Date(year, month, 1), me = new Date(year, month+1, 0, 23, 59, 59);
    return rs <= me && re >= ms;
  });
}

function fmtDT(iso){ const d=new Date(iso); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function fmtFull(iso){ const d=new Date(iso); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function getUserName(eid){ const u=(DB.get('users')||{})[eid]; return u?u.name:eid; }
function getUserDept(eid){ const u=(DB.get('users')||{})[eid]; return u?u.dept:''; }

function openCal(cid) { S.calendarCard = cid; S.calendarMonth = new Date().getMonth(); S.calendarYear = new Date().getFullYear(); render(); }

// ║  7. CALENDAR VIEW (사용자/관리자 공통)                         ║
// ╚═══════════════════════════════════════════════════════════════╝
function renderCalendar(cid) {
  const card = (DB.get('cards') || []).find(c => c.id === cid);
  if (!card) return '';
  const y = S.calendarYear, m = S.calendarMonth;
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const today = new Date();
  const reservations = getResForMonth(cid, y, m);
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dayNames = ['일','월','화','수','목','금','토'];

  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += `<div class="min-h-[68px] sm:min-h-[88px]"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = new Date(y, m, d, 0, 0, 0), de = new Date(y, m, d, 23, 59, 59);
    const isToday = today.getFullYear()===y && today.getMonth()===m && today.getDate()===d;
    const dow = new Date(y, m, d).getDay();
    const dayRes = reservations.filter(r => new Date(r.startTime)<=de && new Date(r.endTime)>=ds);

    let chips = '';
    dayRes.slice(0, 3).forEach(r => {
      const nm = getUserName(r.empId);
      const isPending = r.status === 'pending';
      chips += `<div class="text-[8px] sm:text-[10px] leading-tight font-medium truncate px-1.5 py-[3px] rounded-md mt-[2px] ${isPending ? 'bg-surface-3 text-ink-3' : 'bg-navy-100 text-navy-800'}" title="${nm}: ${fmtDT(r.startTime)}~${fmtDT(r.endTime)}${isPending?' (대기중)':' (승인)'}\n${r.purpose}">${isPending?'⏳ ':''}${nm}</div>`;
    });
    if (dayRes.length > 3) chips += `<div class="text-[8px] text-ink-4 mt-[1px] pl-1">+${dayRes.length - 3}건</div>`;

    cells += `
    <div class="min-h-[68px] sm:min-h-[88px] rounded-xl p-1 sm:p-1.5 border border-transparent
      ${isToday ? 'bg-navy-50 !border-navy-300' : 'hover:bg-surface-1'}
      ${dayRes.length > 0 && !isToday ? 'bg-white' : ''}">
      <div class="flex items-center justify-between mb-[1px]">
        <span class="text-[11px] sm:text-[12px] font-semibold ${isToday ? 'bg-navy-700 text-white w-5 h-5 sm:w-6 sm:h-6 rounded-full flex items-center justify-center' : dow===0?'text-red-400':dow===6?'text-blue-400':'text-ink-2'}">${d}</span>
      </div>
      <div class="overflow-hidden">${chips}</div>
    </div>`;
  }

  const upcoming = [...reservations].sort((a,b) => new Date(a.startTime) - new Date(b.startTime));
  let listHTML = '';
  if (upcoming.length) {
    listHTML = `
    <div class="bg-white rounded-2xl border border-surface-3 p-5 mt-4 shadow-sm">
      <h4 class="text-[14px] font-bold text-ink-1 mb-4 flex items-center gap-2">
        <svg class="w-4 h-4 text-navy-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        이번 달 예약 일정
      </h4>
      <div class="space-y-3">
        ${upcoming.map(r => {
          const isPending = r.status === 'pending';
          return `
          <div class="flex items-start gap-3 ${isPending ? 'opacity-60' : ''}">
            <div class="w-8 h-8 rounded-full bg-navy-100 text-navy-800 flex items-center justify-center text-[11px] font-bold shrink-0 mt-0.5">${getUserName(r.empId)[0]}</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <p class="font-semibold text-ink-1 text-[13px]">${getUserName(r.empId)}</p>
                <span class="text-[10px] text-ink-4">${getUserDept(r.empId)}</span>
                ${isPending ? '<span class="text-[9px] font-semibold bg-surface-2 text-ink-4 px-1.5 py-0.5 rounded">대기</span>' : '<span class="text-[9px] font-semibold bg-emerald-50 text-emerald-600 px-1.5 py-0.5 rounded">승인</span>'}
              </div>
              <p class="text-[12px] text-ink-3 font-medium mt-0.5">${fmtFull(r.startTime)} → ${fmtFull(r.endTime)}</p>
              <p class="text-[11px] text-ink-4 mt-0.5">${r.purpose}</p>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  const backLabel = S.view === 'admin' ? '카드 현황' : '카드 목록';
  const isAdmin = S.user.role === 'admin';

  return `
  <div>
    <button onclick="S.calendarCard=null;render()" class="btn-apple flex items-center gap-1 text-[13px] font-semibold text-navy-700 mb-4">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
      ${backLabel}
    </button>
    <div class="bg-white rounded-2xl border border-surface-3 overflow-hidden shadow-sm">
      <div class="px-5 py-4 flex items-center justify-between border-b border-surface-3">
        <div class="flex items-center gap-3">
          <div class="w-11 h-11 rounded-2xl flex items-center justify-center text-white text-[12px] font-bold shadow-sm" style="background:${card.color}">${card.type==='Visa'?'V':'M'}</div>
          <div>
            <h3 class="font-bold text-ink-1 text-[15px]">${card.name}</h3>
            <p class="text-[11px] text-ink-4">${card.holder} · •••• ${card.last4} · ${card.type}</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          ${statusBadgeSmall(getCardStatus(cid).status)}
          ${!isAdmin ? `<button onclick="S.applyCard='${cid}';S.userTab='apply';render()" class="btn-apple text-[12px] font-semibold text-white bg-navy-700 hover:bg-navy-800 px-4 py-2 rounded-xl shadow-sm ml-1">신청</button>` : ''}
        </div>
      </div>
      <div class="px-5 py-3 flex items-center justify-between bg-surface-1">
        <button onclick="calPrev()" class="btn-apple p-2 rounded-xl hover:bg-surface-2 text-ink-3">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <h4 class="text-[15px] font-bold text-ink-1">${y}년 ${monthNames[m]}</h4>
        <button onclick="calNext()" class="btn-apple p-2 rounded-xl hover:bg-surface-2 text-ink-3">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
      <div class="px-3 sm:px-5 pb-4 pt-2">
        <div class="grid grid-cols-7 mb-1">
          ${dayNames.map((dn, i) => `<div class="text-center text-[11px] font-semibold py-1.5 ${i===0?'text-red-400':i===6?'text-blue-400':'text-ink-4'}">${dn}</div>`).join('')}
        </div>
        <div class="grid grid-cols-7 gap-[3px]">${cells}</div>
        <div class="flex items-center gap-5 text-[11px] text-ink-4 mt-3 pt-3 border-t border-surface-3">
          <span class="flex items-center gap-1.5"><span class="w-3 h-2 rounded bg-navy-100"></span>승인됨</span>
          <span class="flex items-center gap-1.5"><span class="w-3 h-2 rounded bg-surface-3"></span>대기 중</span>
          <span class="flex items-center gap-1.5"><span class="w-5 h-5 rounded-full bg-navy-700 text-white flex items-center justify-center text-[8px] font-bold">${today.getDate()}</span>오늘</span>
        </div>
      </div>
    </div>
    ${listHTML}
  </div>`;
}

// ╚═══════════════════════════════════════════════════════════════╝
function renderApply() {
  const cards = DB.get('cards');
  const now = new Date();
  const min = new Date(now.getTime() - now.getTimezoneOffset()*60000).toISOString().slice(0,16);
  return `
  <div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl border border-surface-3 p-6 sm:p-7 shadow-sm">
      <h2 class="text-[16px] font-bold text-ink-1 mb-1">카드 사용 신청</h2>
      <p class="text-[12px] text-ink-4 mb-6">사용할 카드와 일정, 목적을 입력해주세요. 또는 하단 AI 챗봇으로 더 빠르게 예약하실 수 있어요.</p>
      <div class="space-y-4">
        <div>
          <label class="block text-[12px] font-semibold text-ink-3 mb-1.5 ml-0.5">카드 선택</label>
          <select id="a-card" class="w-full px-4 py-3 bg-surface-2 border-0 rounded-2xl text-[13px] font-medium focus:ring-2 focus:ring-navy-400 transition">
            ${cards.map(c => `<option value="${c.id}" ${S.applyCard===c.id?'selected':''}>${c.name} (${c.holder}) · •••• ${c.last4}</option>`).join('')}
          </select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-[12px] font-semibold text-ink-3 mb-1.5 ml-0.5">시작 일시</label>
            <input id="a-start" type="datetime-local" min="${min}" class="w-full px-3 py-3 bg-surface-2 border-0 rounded-2xl text-[13px] focus:ring-2 focus:ring-navy-400 transition">
          </div>
          <div>
            <label class="block text-[12px] font-semibold text-ink-3 mb-1.5 ml-0.5">종료 일시</label>
            <input id="a-end" type="datetime-local" min="${min}" class="w-full px-3 py-3 bg-surface-2 border-0 rounded-2xl text-[13px] focus:ring-2 focus:ring-navy-400 transition">
          </div>
        </div>
        <div>
          <label class="block text-[12px] font-semibold text-ink-3 mb-1.5 ml-0.5">사용 목적</label>
          <textarea id="a-purpose" rows="3" placeholder="예: 거래처 미팅 식비, 출장 교통비 등"
            class="w-full px-4 py-3 bg-surface-2 border-0 rounded-2xl text-[13px] focus:ring-2 focus:ring-navy-400 transition resize-none placeholder:text-ink-5"></textarea>
        </div>
        <button onclick="submitApp()"
          class="btn-apple w-full bg-gradient-to-b from-navy-700 to-navy-900 hover:from-navy-800 hover:to-navy-950
          text-white font-bold py-3.5 rounded-2xl shadow-md shadow-navy-900/20 text-[14px]">
          신청서 제출
        </button>
      </div>
    </div>
  </div>`;
}

/** 신청 폼 제출 → DB에 pending 상태로 추가 */
function submitApp() {
  const cid = $('#a-card').value, st = $('#a-start').value, en = $('#a-end').value, pu = $('#a-purpose').value.trim();
  if (!st || !en) { toast('시작/종료 일시를 입력해주세요.','error'); return; }
  if (new Date(st) >= new Date(en)) { toast('종료 시간은 시작 이후여야 합니다.','error'); return; }
  if (new Date(st) < new Date()) { toast('시작 시간은 현재 이후여야 합니다.','error'); return; }
  if (!pu) { toast('사용 목적을 입력해주세요.','error'); return; }
  if (hasConflict(cid, st, en)) { toast('해당 시간에 이미 예약/대기가 있습니다.','error'); return; }

  const res = DB.get('reservations');
  res.push({
    id: 'R' + Date.now(),
    cardId: cid, empId: S.user.empId,
    startTime: st, endTime: en,
    purpose: pu, status: 'pending',
    createdAt: new Date().toISOString()
  });
  DB.set('reservations', res);
  S.applyCard = null; S.userTab = 'history'; render(); toast('신청이 완료되었습니다!');
}

function cancelRes(id) {
  DB.set('reservations', (DB.get('reservations') || []).filter(x => x.id !== id));

}

    pending:  '<span class="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-amber-50 text-amber-600 border border-amber-200">대기 중</span>',
    approved: '<span class="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-600 border border-emerald-200">승인됨</span>',
    rejected: '<span class="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-red-50 text-red-500 border border-red-200">거절됨</span>'
  }[s]);

        <span class="text-[10px] text-ink-5">${fmtFull(r.createdAt)}</span>
        ${r.status === 'pending' ? `
          <div class="flex gap-2">
            <button onclick="adminAct('${r.id}','rejected')" class="btn-apple text-[12px] font-semibold text-red-500 hover:bg-red-50 border border-red-200 px-4 py-1.5 rounded-xl transition">거절</button>

function adminAct(id, action) {
  const res = DB.get('reservations'), r = res.find(x => x.id === id);
  if (!r) return;
  if (action === 'approved' && hasConflict(r.cardId, r.startTime, r.endTime, id)) {
    toast('해당 시간대에 이미 승인된 예약이 있습니다.','error'); return;
  }
  r.status = action; DB.set('reservations', res); render();
  toast(action==='approved' ? '승인되었습니다.' : '거절되었습니다.', action==='approved' ? 'success' : 'info');
}

// ╔═══════════════════════════════════════════════════════════════╗
// ║ 11. AI CHAT : Smart Concierge                                  ║
// ║   Gemini API를 활용한 자연어 예약 처리                         ║
// ╚═══════════════════════════════════════════════════════════════╝

/** 채팅 패널 열기/닫기 */
function toggleChat() {
  S.chatOpen = !S.chatOpen;
  const panel = document.getElementById('chat-panel');
  if (S.chatOpen) {
    panel.classList.remove('hidden');
    panel.classList.add('slide-in-bottom');
    renderChatMessages();
    setTimeout(() => document.getElementById('chat-input')?.focus(), 200);
  } else {
    panel.classList.add('hidden');
  }
}

/** 최초 로그인 시 환영 메시지 */
function initChatWelcome() {
  if (S.chatHistory.length === 0) {
    S.chatHistory.push({
      role: 'ai',
      text: `안녕하세요 ${S.user.name}님! 👋\n법인카드 예약을 도와드리는 Smart Concierge입니다.\n\n자연스럽게 말씀해 주세요:\n• "내일 오전 10시부터 2시간 동안 소모품 구매용으로 카드 예약해줘"\n• "내 예약 현황 알려줘"\n• "방금 신청한 거 취소해줘"`,
      time: new Date().toISOString()
    });
  }
}

/** 채팅 메시지 리스트 렌더링 */
function renderChatMessages() {
  const box = document.getElementById('chat-messages');
  box.innerHTML = S.chatHistory.map(m => {
    if (m.role === 'user') {
      return `<div class="flex justify-end slide-in-right">
        <div class="bubble-user px-4 py-2.5 max-w-[80%] text-[13px] leading-relaxed whitespace-pre-wrap">${escapeHTML(m.text)}</div>
      </div>`;
    } else if (m.role === 'ai') {
      let extra = '';
      if (m.action === 'RESERVE_OK') extra = `<button onclick="S.userTab='history';toggleChat();render()" class="btn-apple mt-2 text-[11px] font-semibold text-navy-700 bg-navy-50 hover:bg-navy-100 px-3 py-1.5 rounded-lg">내 현황 보기 →</button>`;
      return `<div class="flex items-start gap-2 slide-in-right">
        <div class="w-7 h-7 rounded-full bg-gradient-to-br from-navy-700 to-navy-900 text-white flex items-center justify-center shrink-0 text-[10px] font-bold">AI</div>
        <div class="bubble-ai px-4 py-2.5 max-w-[80%] text-[13px] leading-relaxed whitespace-pre-wrap">${escapeHTML(m.text)}${extra}</div>
      </div>`;
    } else if (m.role === 'system') {
      return `<div class="flex justify-center"><div class="bubble-system px-3 py-1.5 text-[11px] font-medium">${escapeHTML(m.text)}</div></div>`;
    } else if (m.role === 'typing') {
      return `<div class="flex items-start gap-2">
        <div class="w-7 h-7 rounded-full bg-gradient-to-br from-navy-700 to-navy-900 text-white flex items-center justify-center shrink-0 text-[10px] font-bold">AI</div>
        <div class="bubble-ai px-4 py-3"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>
      </div>`;
    }
  }).join('');
  box.scrollTop = box.scrollHeight;
}

function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/** 입력창 자동 리사이즈 */
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

/** Enter=전송, Shift+Enter=줄바꿈 */
function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
}

/** 사용자 메시지 전송 → Gemini 호출 → 결과 처리 */
async function sendChatMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text && !S.pendingImage) return;

  if (!API_KEY) { openApiKeySettings(); return; }

  // 사용자 말풍선 추가
  S.chatHistory.push({ role:'user', text: text || '(이미지 첨부)', time: new Date().toISOString() });
  input.value = ''; autoResize(input);
  S.chatHistory.push({ role:'typing' });
  renderChatMessages();

  try {
    const result = await callGemini(text, S.pendingImage);
    // typing 제거
    S.chatHistory = S.chatHistory.filter(m => m.role !== 'typing');
    await handleAIResponse(result);
  } catch (err) {
    S.chatHistory = S.chatHistory.filter(m => m.role !== 'typing');
    S.chatHistory.push({ role:'ai', text:`죄송합니다, 오류가 발생했어요.\n${err.message || err}` });
    renderChatMessages();
  } finally {
    S.pendingImage = null;
    document.getElementById('image-preview').classList.add('hidden');
    document.getElementById('image-preview').innerHTML = '';
  }
}

/**
 * Gemini API 호출
 * ─────────────────────────────────────────
 * 시스템 프롬프트에 현재 카드 목록과 사용자의 예약 현황을 컨텍스트로 주입해
 * LLM이 중복 체크 및 대안 시간 제시를 할 수 있게 합니다.
 *
 * 응답은 반드시 다음 JSON 스키마를 따릅니다:
 *   {
 *     "action": "RESERVE"|"QUERY"|"CANCEL"|"CHAT",
 *     "cardId": "C001" (optional),
 *     "startTime": "YYYY-MM-DDTHH:mm" (RESERVE일 때),
 *     "endTime":   "YYYY-MM-DDTHH:mm" (RESERVE일 때),
 *     "purpose":   "...",
 *     "reservationId": "R..." (CANCEL일 때),
 *     "message":   "사용자에게 보여줄 자연어 답변"
 *   }
 */
async function callGemini(userText, imageBase64) {
  const cards = DB.get('cards');
  const allRes = DB.get('reservations') || [];
  const users = DB.get('users') || {};
  const now = new Date();

  // 현재 사용자의 예약 내역 + 전체 카드의 향후 예약 내역(중복 체크용)
  const myReservations = allRes.filter(r => r.empId === S.user.empId);
  const futureReservations = allRes.filter(r => {
    return (r.status === 'approved' || r.status === 'pending') && new Date(r.endTime) >= now;
  });

  const systemInstruction = `
당신은 사내 법인카드 예약 시스템의 AI 어시스턴트 "Smart Concierge"입니다.
사용자의 자연어 요청을 분석해 다음 네 가지 행동 중 하나로 분류하고 JSON으로 응답합니다.

[가능한 action]
1. RESERVE  : 카드 예약 신청
2. QUERY    : 예약 현황 조회
3. CANCEL   : 예약 취소
4. CHAT     : 기타 대화(인사, 도움말, 불명확한 요청 등)

[현재 시각] ${now.toISOString()}  (${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${['일','월','화','수','목','금','토'][now.getDay()]}요일 ${now.getHours()}시 ${now.getMinutes()}분)

[로그인 사용자]
- 사번: ${S.user.empId}
- 이름: ${S.user.name}
- 부서: ${S.user.dept}

[사용 가능한 카드 목록]
${cards.map(c => `- ${c.id}: ${c.name} (${c.holder}, •••• ${c.last4})`).join('\n')}

[사용자의 전체 예약 내역 (본인)]
${myReservations.length ? myReservations.map(r => `- ${r.id} | ${r.cardId} | ${r.startTime}~${r.endTime} | ${r.status} | ${r.purpose}`).join('\n') : '(없음)'}

[전체 승인/대기 중인 예약 (중복 체크용)]
${futureReservations.length ? futureReservations.map(r => `- ${r.cardId} | ${r.startTime}~${r.endTime} | ${r.status} | ${users[r.empId]?.name || r.empId}`).join('\n') : '(없음)'}

[중요 규칙]
- 시간 표현은 반드시 "YYYY-MM-DDTHH:mm" 형식으로 변환. 예: "2025-10-27T10:00"
- "내일", "모레", "다음 주 월요일" 같은 상대 시간은 현재 시각 기준으로 계산.
- "오전 10시부터 2시간"이면 startTime=10:00, endTime=12:00.
- cardId가 명시되지 않으면 사용 가능한(해당 시간대에 충돌 없는) 첫 번째 카드를 자동 선택.
- RESERVE 요청 시 해당 시간대에 다른 승인/대기 예약과 충돌하면:
  action은 여전히 RESERVE로 하되, message에 "충돌 안내 + 추천 대안 시간"을 작성하고,
  startTime/endTime은 충돌 없는 대안 시간으로 제안.
  (예: "⚠️ 10시~12시는 김민수님이 C001을 사용 중이에요. 대신 13시~15시는 어떠세요?")
- CANCEL 시 reservationId 특정이 애매하면 가장 최근 pending 예약을 대상으로.
- message는 한국어, 친근하고 간결한 존댓말(2~4문장).
- 불필요한 설명, 마크다운 없이 JSON만 반환.

[반환 JSON 스키마]
{
  "action": "RESERVE" | "QUERY" | "CANCEL" | "CHAT",
  "cardId": "C001" (선택),
  "startTime": "YYYY-MM-DDTHH:mm" (RESERVE일 때 필수),
  "endTime":   "YYYY-MM-DDTHH:mm" (RESERVE일 때 필수),
  "purpose":   "문자열" (RESERVE일 때 필수),
  "reservationId": "R..." (CANCEL일 때),
  "message":   "사용자에게 보여줄 최종 응답"
}
`.trim();

  // contents parts 구성 (텍스트 + 선택적 이미지)
  const parts = [];
  if (userText) parts.push({ text: userText });
  if (imageBase64) {
    // base64 header 제거
    const cleanB64 = imageBase64.replace(/^data:image\/\w+;base64,/, '');
    parts.push({ inline_data: { mime_type: 'image/jpeg', data: cleanB64 } });
    parts.push({ text: '\n(참고: 첨부된 이미지는 영수증이나 관련 문서일 수 있습니다. 내용을 참고해주세요.)' });
  }

  const body = {
    systemInstruction: { parts: [{ text: systemInstruction }] },
    contents: [{ role:'user', parts }],
    generationConfig: {
      responseMimeType: 'application/json',
      temperature: 0.2,
    }
  };

  const resp = await fetch(GEMINI_URL(API_KEY), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    const errTxt = await resp.text();
    throw new Error(`API 오류 (${resp.status}): ${errTxt.slice(0, 200)}`);
  }

  const data = await resp.json();
  const jsonText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!jsonText) throw new Error('AI 응답이 비어있어요.');

  return JSON.parse(jsonText);
}

/**
 * AI 응답을 실제 시스템 동작으로 변환
 * ─────────────────────────────────────────
 * - RESERVE : 중복 재검증 후 DB에 추가
 * - QUERY   : AI의 message를 그대로 노출
 * - CANCEL  : 예약 삭제
 * - CHAT    : 단순 응답
 */
async function handleAIResponse(result) {
  const { action, message } = result;

  if (action === 'RESERVE') {
    const { cardId, startTime, endTime, purpose } = result;
    const cards = DB.get('cards');
    let finalCardId = cardId;

    // cardId 미지정 시: 사용 가능한 첫 카드 자동 선택
    if (!finalCardId || !cards.find(c => c.id === finalCardId)) {
      const available = cards.find(c => !hasConflict(c.id, startTime, endTime));
      finalCardId = available ? available.id : cards[0].id;
    }

    // 최종 JS 측 중복 체크 (AI가 놓쳤을 가능성 대비)
    if (hasConflict(finalCardId, startTime, endTime)) {
      S.chatHistory.push({
        role:'ai',
        text: (message || '') + '\n\n⚠️ 해당 시간대에 이미 다른 예약이 있어요. 다른 시간을 알려주시겠어요?'
      });
      renderChatMessages(); return;
    }

    // 시간 검증
    if (!startTime || !endTime || new Date(startTime) >= new Date(endTime) || new Date(startTime) < new Date()) {
      S.chatHistory.push({ role:'ai', text:(message||'') + '\n\n시간 정보를 다시 한번 알려주실 수 있나요?' });
      renderChatMessages(); return;
    }

    // DB에 pending 상태로 추가
    const res = DB.get('reservations');
    const newRes = {
      id: 'R' + Date.now(),
      cardId: finalCardId,
      empId: S.user.empId,
      startTime, endTime,
      purpose: purpose || '업무 사용',
      status: 'pending',
      createdAt: new Date().toISOString(),
      source: 'ai'
    };
    res.push(newRes);
    DB.set('reservations', res);

    // 현재 사용자 화면이 보여지고 있다면 리렌더링
    if (S.view === 'user' || S.view === 'admin') render();

    const card = cards.find(c => c.id === finalCardId);
    S.chatHistory.push({
      role:'ai',
      text: (message || '예약이 접수되었습니다!') + `\n\n✅ ${card?.name || finalCardId}\n📅 ${fmtFull(startTime)} ~ ${fmtFull(endTime)}\n📝 ${purpose || '업무 사용'}\n\n관리자 승인 후 확정됩니다.`,
      action: 'RESERVE_OK'
    });

  } else if (action === 'QUERY') {
    S.chatHistory.push({ role:'ai', text: message || '조회 결과를 확인해주세요.' });

  } else if (action === 'CANCEL') {
    const { reservationId } = result;
    let allRes = DB.get('reservations') || [];
    const myPending = allRes.filter(r => r.empId === S.user.empId && r.status === 'pending');
    let targetId = reservationId;

    // ID 미지정 시 가장 최근 pending 제거
    if (!targetId && myPending.length) targetId = myPending[myPending.length - 1].id;

    if (targetId && allRes.find(r => r.id === targetId && r.empId === S.user.empId)) {
      allRes = allRes.filter(r => r.id !== targetId);
      DB.set('reservations', allRes);
      if (S.view === 'user' || S.view === 'admin') render();
      S.chatHistory.push({ role:'ai', text: message || '예약을 취소했어요.' });
    } else {
      S.chatHistory.push({ role:'ai', text: message || '취소할 예약을 찾지 못했어요.' });
    }

  } else {
    // CHAT 또는 알 수 없는 action
    S.chatHistory.push({ role:'ai', text: message || '무엇을 도와드릴까요?' });
  }

  renderChatMessages();
}

// ║ 12. API KEY 설정                                               ║
// ╚═══════════════════════════════════════════════════════════════╝
function openApiKeySettings() {
  document.getElementById('api-modal').classList.remove('hidden');
  document.getElementById('api-key-input').value = API_KEY || '';
  setTimeout(() => document.getElementById('api-key-input').focus(), 100);
}
function closeApiKeySettings() { document.getElementById('api-modal').classList.add('hidden'); }
function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { toast('API 키를 입력해주세요.','error'); return; }
  API_KEY = key;
  localStorage.setItem('gemini_api_key', key);
  closeApiKeySettings();
  toast('API 키가 저장되었습니다.');
}

// ╔═══════════════════════════════════════════════════════════════╗
// ║ 13. 음성 입력 (STT) - Web Speech API                           ║
// ╚═══════════════════════════════════════════════════════════════╝
function toggleVoiceInput() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('이 브라우저는 음성 인식을 지원하지 않아요.','error'); return; }

  const btn = document.getElementById('mic-btn');

  if (S.recognizing && S.recognition) {
    S.recognition.stop();
    return;
  }

  const rec = new SR();
  rec.lang = 'ko-KR';
  rec.interimResults = true;
  rec.continuous = false;

  rec.onstart = () => {
    S.recognizing = true;
    btn.classList.add('bg-red-500','text-white','recording-pulse');
    btn.classList.remove('bg-surface-2','text-ink-3');
  };
  rec.onresult = (e) => {
    let txt = '';
    for (let i = 0; i < e.results.length; i++) txt += e.results[i][0].transcript;
    const input = document.getElementById('chat-input');
    input.value = txt;
    autoResize(input);
  };
  rec.onerror = (e) => {
    toast('음성 인식 오류: ' + e.error,'error');
  };
  rec.onend = () => {
    S.recognizing = false;
    btn.classList.remove('bg-red-500','text-white','recording-pulse');
    btn.classList.add('bg-surface-2','text-ink-3');
  };

  S.recognition = rec;
  rec.start();
}

// ╔═══════════════════════════════════════════════════════════════╗
// ║ 14. 이미지 업로드 (영수증 OCR 확장 포인트)                     ║
// ║   Gemini는 멀티모달 모델이므로 이미지를 그대로 전달 가능       ║
// ╚═══════════════════════════════════════════════════════════════╝
function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 4 * 1024 * 1024) { toast('이미지는 4MB 이하여야 해요.','error'); return; }

  const reader = new FileReader();
  reader.onload = (ev) => {
    S.pendingImage = ev.target.result;
    const preview = document.getElementById('image-preview');
    preview.innerHTML = `
      <div class="relative inline-block">
        <img src="${ev.target.result}" class="h-16 rounded-xl border border-surface-3">
        <button onclick="clearPendingImage()" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white rounded-full text-[10px] flex items-center justify-center shadow-md">✕</button>
      </div>
      <p class="text-[10px] text-ink-4 mt-1">이미지와 함께 메시지를 보내면 AI가 내용을 분석해요</p>`;
    preview.classList.remove('hidden');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function clearPendingImage() {
  S.pendingImage = null;
  document.getElementById('image-preview').classList.add('hidden');
  document.getElementById('image-preview').innerHTML = '';
}

// ╔═══════════════════════════════════════════════════════════════╗
// ║ 15. INIT                                                       ║
// ╚═══════════════════════════════════════════════════════════════╝
render();
</script>
