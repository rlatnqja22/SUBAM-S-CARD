<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>법인카드 예약 관리</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script>
tailwind.config={theme:{extend:{colors:{
  accent:{50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309',800:'#92400e',900:'#78350f'},
  surface:{0:'#ffffff',1:'#f9fafb',2:'#f3f4f6',3:'#e5e7eb',4:'#d1d5db'},
  ink:{1:'#111827',2:'#374151',3:'#6b7280',4:'#9ca3af',5:'#d1d5db'}
},fontFamily:{sans:['"Noto Sans KR"','-apple-system','BlinkMacSystemFont','system-ui','sans-serif']}}}}
</script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#f2f2f7;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:9px}
.fade-in{animation:fadeIn .3s ease}
.slide-up{animation:slideUp .35s cubic-bezier(.23,1,.32,1)}
.scale-in{animation:scaleIn .25s cubic-bezier(.23,1,.32,1)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.glass{background:rgba(255,255,255,.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.card-el{transition:all .2s cubic-bezier(.23,1,.32,1)}
.card-el:hover{transform:translateY(-1px);box-shadow:0 4px 24px rgba(0,0,0,.06)}
.card-el:active{transform:scale(.985)}
.btn-apple{transition:all .15s ease}
.btn-apple:active{transform:scale(.97);opacity:.85}
.cal-cell{transition:background .15s ease}
input,select,textarea{font-family:inherit}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-wrap" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-2"></div>

<script>
// ═══════════════════════════════════════════
//  DATA LAYER
// ═══════════════════════════════════════════
const DB={
  _k:k=>`cc_${k}`,
  get(k){try{return JSON.parse(localStorage.getItem(this._k(k)))}catch{return null}},
  set(k,v){localStorage.setItem(this._k(k),JSON.stringify(v))},
  init(){
    if(!this.get('cards'))this.set('cards',[
      {id:'C001',name:'법인카드 1',holder:'경영지원팀',last4:'4821',type:'Visa',color:'#f59e0b'},
      {id:'C002',name:'법인카드 2',holder:'마케팅팀',last4:'7753',type:'Mastercard',color:'#3b82f6'},
      {id:'C003',name:'법인카드 3',holder:'개발팀',last4:'3390',type:'Visa',color:'#10b981'},
      {id:'C004',name:'법인카드 4',holder:'영업팀',last4:'1567',type:'Mastercard',color:'#8b5cf6'},
    ]);
    if(!this.get('reservations'))this.set('reservations',[]);
    if(!this.get('users'))this.set('users',{
      '1234':{name:'관리자',dept:'경영지원팀',role:'admin'},
      '5678':{name:'김민수',dept:'개발팀',role:'user'},
      '9012':{name:'이영희',dept:'마케팅팀',role:'user'},
      '3456':{name:'박철수',dept:'영업팀',role:'user'},
    });
  }
};
DB.init();

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let S={
  user:null,
  view:'login',
  userTab:'cards',
  adminTab:'requests',
  calendarCard:null,
  calendarMonth:new Date().getMonth(),
  calendarYear:new Date().getFullYear(),
  applyCard:null,
};

const app=()=>document.getElementById('app');
const $=sel=>document.querySelector(sel);

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function toast(msg,type='success'){
  const w=document.getElementById('toast-wrap');
  const colors={success:'bg-emerald-500',error:'bg-red-500',info:'bg-ink-1'};
  const icons={
    success:`<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>`,
    error:`<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>`,
    info:`<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/><path stroke-width="2" d="M12 16v-4m0-4h.01"/></svg>`,
  };
  const el=document.createElement('div');
  el.className=`${colors[type]} text-white px-5 py-3 rounded-2xl shadow-lg flex items-center gap-2.5 text-sm font-medium scale-in`;
  el.style.minWidth='220px';
  el.innerHTML=`${icons[type]}<span>${msg}</span>`;
  w.appendChild(el);
  setTimeout(()=>{el.style.transition='opacity .3s';el.style.opacity='0';setTimeout(()=>el.remove(),300)},2500);
}

function getCardStatus(cid){
  const now=new Date(),res=DB.get('reservations')||[];
  const active=res.find(r=>r.cardId===cid&&r.status==='approved'&&new Date(r.startTime)<=now&&new Date(r.endTime)>=now);
  if(active)return{status:'in-use',r:active};
  const up=res.find(r=>r.cardId===cid&&r.status==='approved'&&new Date(r.startTime)>now);
  if(up)return{status:'reserved',r:up};
  return{status:'available',r:null};
}

function hasConflict(cid,s,e,exId=null){
  return(DB.get('reservations')||[]).some(r=>{
    if(r.cardId!==cid||r.id===exId)return false;
    if(r.status!=='approved'&&r.status!=='pending')return false;
    return new Date(s)<new Date(r.endTime)&&new Date(e)>new Date(r.startTime);
  });
}

function fmtDT(iso){const d=new Date(iso);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function fmtFull(iso){const d=new Date(iso);return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}

function getResForMonth(cid,year,month){
  return(DB.get('reservations')||[]).filter(r=>{
    if(r.cardId!==cid||(r.status!=='approved'&&r.status!=='pending'))return false;
    const rs=new Date(r.startTime),re=new Date(r.endTime);
    const ms=new Date(year,month,1),me=new Date(year,month+1,0,23,59,59);
    return rs<=me&&re>=ms;
  });
}

function getUserName(eid){const u=(DB.get('users')||{})[eid];return u?u.name:eid}
function getUserDept(eid){const u=(DB.get('users')||{})[eid];return u?u.dept:''}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render(){
  switch(S.view){
    case'login':renderLogin();break;
    case'user':renderUser();break;
    case'admin':renderAdmin();break;
  }
}

// ── LOGIN ──────────────────────────────────
function renderLogin(){
  app().innerHTML=`
  <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-accent-100 via-accent-50 to-orange-50 relative overflow-hidden">
    <div class="absolute inset-0 pointer-events-none">
      <div class="absolute -top-32 -left-32 w-[500px] h-[500px] bg-accent-300/30 rounded-full blur-[100px]"></div>
      <div class="absolute -bottom-40 -right-40 w-[600px] h-[600px] bg-orange-200/30 rounded-full blur-[120px]"></div>
    </div>
    <div class="relative z-10 w-full max-w-[380px] px-6 fade-in">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-[72px] h-[72px] bg-gradient-to-b from-accent-400 to-accent-600 rounded-[22px] shadow-lg shadow-accent-400/30 mb-5">
          <svg class="w-9 h-9 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
        </div>
        <h1 class="text-[26px] font-extrabold text-ink-1 tracking-tight">법인카드 예약</h1>
        <p class="text-ink-4 text-[15px] mt-1.5">사번을 입력하여 시작하세요</p>
      </div>
      <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-xl shadow-black/5 border border-white/60 p-7">
        <label class="block text-[13px] font-semibold text-ink-3 mb-2 ml-1">사번</label>
        <input id="emp-id" type="text" inputmode="numeric" placeholder="예: 1234"
          class="w-full px-4 py-3.5 bg-surface-2 border-0 rounded-2xl text-[15px] font-medium tracking-wider
          focus:outline-none focus:ring-2 focus:ring-accent-400 placeholder:text-ink-5 placeholder:tracking-normal transition"
          onkeydown="if(event.key==='Enter')doLogin()" autofocus>
        <button onclick="doLogin()"
          class="btn-apple w-full mt-4 bg-gradient-to-b from-accent-400 to-accent-500 hover:from-accent-500 hover:to-accent-600
          text-white font-bold py-3.5 rounded-2xl shadow-md shadow-accent-400/25 text-[15px]">
          로그인
        </button>
      </div>
      <p class="text-center text-[11px] text-ink-4/70 mt-6 leading-relaxed">
        테스트 &nbsp;
        <span class="font-semibold text-ink-3">1234</span>(관리자) · 
        <span class="font-semibold text-ink-3">5678</span> · 
        <span class="font-semibold text-ink-3">9012</span> · 
        <span class="font-semibold text-ink-3">3456</span>
      </p>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById('emp-id')?.focus(),100);
}

function doLogin(){
  const eid=document.getElementById('emp-id').value.trim();
  if(!eid){toast('사번을 입력해주세요.','error');return}
  const users=DB.get('users');
  let u=users[eid];
  if(!u){u={name:`사원_${eid}`,dept:'미지정',role:'user'};users[eid]=u;DB.set('users',users);toast('새 사용자로 등록되었습니다.','info')}
  S.user={...u,empId:eid};
  S.view=u.role==='admin'?'admin':'user';
  S.userTab='cards';S.adminTab='requests';S.calendarCard=null;
  render();toast(`${u.name}님 환영합니다!`);
}
function doLogout(){S.user=null;S.view='login';render()}

// ── HEADER ─────────────────────────────────
function hdr(){
  const u=S.user,isA=u.role==='admin';
  return`
  <header class="glass border-b border-black/5 sticky top-0 z-40">
    <div class="max-w-5xl mx-auto px-5 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-gradient-to-b from-accent-400 to-accent-500 rounded-xl flex items-center justify-center shadow-sm">
          <svg class="w-[18px] h-[18px] text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
        </div>
        <span class="text-[15px] font-bold text-ink-1 hidden sm:inline">법인카드 예약</span>
        ${isA?'<span class="text-[11px] font-bold bg-accent-100 text-accent-700 px-2 py-0.5 rounded-lg">관리자</span>':''}
      </div>
      <div class="flex items-center gap-3">
        <div class="text-right mr-1 hidden sm:block">
          <p class="text-[13px] font-semibold text-ink-1">${u.name}</p>
          <p class="text-[11px] text-ink-4">${u.dept}</p>
        </div>
        <div class="w-8 h-8 rounded-full bg-accent-100 text-accent-700 flex items-center justify-center text-[13px] font-bold">${u.name[0]}</div>
        <button onclick="doLogout()" class="btn-apple p-1.5 text-ink-4 hover:text-red-500 transition" title="로그아웃">
          <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </header>`;
}

// ═══════════════════════════════════════════
//  USER VIEW
// ═══════════════════════════════════════════
function renderUser(){
  const tabs=[
    {k:'cards',l:'카드 목록',ico:'<svg class="w-[15px] h-[15px]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>'},
    {k:'apply',l:'카드 신청',ico:'<svg class="w-[15px] h-[15px]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>'},
    {k:'history',l:'내 현황',ico:'<svg class="w-[15px] h-[15px]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>'},
  ];
  let content='';
  if(S.userTab==='cards')content=S.calendarCard?renderCalendar(S.calendarCard):renderCards();
  else if(S.userTab==='apply')content=renderApply();
  else content=renderHistory();

  app().innerHTML=`${hdr()}
  <main class="max-w-5xl mx-auto px-5 py-5 fade-in">
    <nav class="flex gap-1 bg-surface-2 rounded-2xl p-1 mb-5">
      ${tabs.map(t=>`<button onclick="S.userTab='${t.k}';S.calendarCard=null;render()"
        class="btn-apple flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-xl text-[13px] font-semibold
        ${S.userTab===t.k?'bg-white text-ink-1 shadow-sm':'text-ink-3 hover:text-ink-2'}">${t.ico}${t.l}</button>`).join('')}
    </nav>
    <div class="slide-up">${content}</div>
  </main>`;
}

function statusBadgeSmall(st){
  const m={available:{l:'사용 가능',c:'bg-emerald-50 text-emerald-600',d:'bg-emerald-500'},reserved:{l:'예약됨',c:'bg-accent-50 text-accent-700',d:'bg-accent-500'},'in-use':{l:'사용 중',c:'bg-red-50 text-red-500',d:'bg-red-500'}};
  const s=m[st];
  return`<span class="inline-flex items-center gap-1 text-[11px] font-semibold px-2.5 py-1 rounded-full ${s.c}"><span class="w-1.5 h-1.5 rounded-full ${s.d}"></span>${s.l}</span>`;
}

function renderCards(){
  const cards=DB.get('cards');
  return`<div class="grid gap-3 sm:grid-cols-2">${cards.map(c=>{
    const cs=getCardStatus(c.id);
    let sub='';
    if(cs.r){sub=`<p class="text-[11px] text-ink-4 mt-2 pt-2 border-t border-surface-3"><span class="font-semibold text-ink-3">${getUserName(cs.r.empId)}</span> · ${fmtDT(cs.r.startTime)}~${fmtDT(cs.r.endTime)}</p>`}
    return`
    <div class="card-el bg-white rounded-2xl border border-surface-3/60 p-5 cursor-pointer" onclick="openCal('${c.id}')">
      <div class="flex items-start justify-between mb-3">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-2xl flex items-center justify-center text-white text-[11px] font-bold shadow-sm" style="background:${c.color}">${c.type==='Visa'?'V':'M'}</div>
          <div><h3 class="font-bold text-ink-1 text-[14px]">${c.name}</h3><p class="text-[11px] text-ink-4">${c.holder} · •••• ${c.last4}</p></div>
        </div>
        ${statusBadgeSmall(cs.status)}
      </div>
      ${sub}
      <div class="flex items-center justify-between mt-3 pt-3 border-t border-surface-3/50">
        <span class="text-[11px] text-ink-4 flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          달력 보기
        </span>
        <button onclick="event.stopPropagation();S.applyCard='${c.id}';S.userTab='apply';render()"
          class="btn-apple text-[12px] font-semibold text-accent-600 hover:text-accent-700 bg-accent-50 hover:bg-accent-100 px-3 py-1.5 rounded-xl transition">신청하기</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function openCal(cid){S.calendarCard=cid;S.calendarMonth=new Date().getMonth();S.calendarYear=new Date().getFullYear();render()}
function calPrev(){S.calendarMonth--;if(S.calendarMonth<0){S.calendarMonth=11;S.calendarYear--}render()}
function calNext(){S.calendarMonth++;if(S.calendarMonth>11){S.calendarMonth=0;S.calendarYear++}render()}

// ═══════════════════════════════════════════
//  CALENDAR (shared by user & admin)
// ═══════════════════════════════════════════
function renderCalendar(cid){
  const card=(DB.get('cards')||[]).find(c=>c.id===cid);
  if(!card)return'';
  const y=S.calendarYear,m=S.calendarMonth;
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();
  const reservations=getResForMonth(cid,y,m);
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dayNames=['일','월','화','수','목','금','토'];

  let cells='';
  for(let i=0;i<firstDay;i++) cells+=`<div class="min-h-[68px] sm:min-h-[88px]"></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const ds=new Date(y,m,d,0,0,0),de=new Date(y,m,d,23,59,59);
    const isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    const dow=new Date(y,m,d).getDay();
    const dayRes=reservations.filter(r=>new Date(r.startTime)<=de&&new Date(r.endTime)>=ds);

    let chips='';
    dayRes.slice(0,3).forEach(r=>{
      const nm=getUserName(r.empId);
      const isPending=r.status==='pending';
      chips+=`<div class="text-[8px] sm:text-[10px] leading-tight font-medium truncate px-1.5 py-[3px] rounded-md mt-[2px] ${isPending?'bg-surface-3/60 text-ink-3':'bg-accent-200/60 text-accent-900'}" title="${nm}: ${fmtDT(r.startTime)}~${fmtDT(r.endTime)}${isPending?' (대기중)':' (승인)'}\n${r.purpose}">${isPending?'⏳ ':''}${nm}</div>`;
    });
    if(dayRes.length>3) chips+=`<div class="text-[8px] text-ink-4 mt-[1px] pl-1">+${dayRes.length-3}건</div>`;

    cells+=`
    <div class="min-h-[68px] sm:min-h-[88px] rounded-xl p-1 sm:p-1.5 cal-cell border border-transparent
      ${isToday?'bg-accent-50 !border-accent-300':'hover:bg-surface-1'}
      ${dayRes.length>0&&!isToday?'bg-white':''}">
      <div class="flex items-center justify-between mb-[1px]">
        <span class="text-[11px] sm:text-[12px] font-semibold ${isToday?'bg-accent-500 text-white w-5 h-5 sm:w-6 sm:h-6 rounded-full flex items-center justify-center':dow===0?'text-red-400':dow===6?'text-blue-400':'text-ink-2'}">${d}</span>
      </div>
      <div class="overflow-hidden">${chips}</div>
    </div>`;
  }

  // Upcoming reservations list
  const upcoming=[...reservations].sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
  let listHTML='';
  if(upcoming.length){
    listHTML=`
    <div class="bg-white rounded-2xl border border-surface-3/60 p-5 mt-4">
      <h4 class="text-[14px] font-bold text-ink-1 mb-4 flex items-center gap-2">
        <svg class="w-4 h-4 text-accent-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        이번 달 예약 일정
      </h4>
      <div class="space-y-3">
        ${upcoming.map(r=>{
          const isPending=r.status==='pending';
          return`
          <div class="flex items-start gap-3 ${isPending?'opacity-60':''}">
            <div class="w-8 h-8 rounded-full bg-accent-100 text-accent-700 flex items-center justify-center text-[11px] font-bold shrink-0 mt-0.5">${getUserName(r.empId)[0]}</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <p class="font-semibold text-ink-1 text-[13px]">${getUserName(r.empId)}</p>
                <span class="text-[10px] text-ink-4">${getUserDept(r.empId)}</span>
                ${isPending?'<span class="text-[9px] font-semibold bg-surface-2 text-ink-4 px-1.5 py-0.5 rounded">대기</span>':'<span class="text-[9px] font-semibold bg-emerald-50 text-emerald-600 px-1.5 py-0.5 rounded">승인</span>'}
              </div>
              <p class="text-[12px] text-ink-3 font-medium mt-0.5">${fmtFull(r.startTime)} → ${fmtFull(r.endTime)}</p>
              <p class="text-[11px] text-ink-4 mt-0.5">${r.purpose}</p>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  const backLabel=S.view==='admin'?'카드 현황':'카드 목록';
  const isAdmin=S.user.role==='admin';

  return`
  <div>
    <button onclick="S.calendarCard=null;render()" class="btn-apple flex items-center gap-1 text-[13px] font-semibold text-accent-600 mb-4">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
      ${backLabel}
    </button>

    <div class="bg-white rounded-2xl border border-surface-3/60 overflow-hidden">
      <!-- Card Info Bar -->
      <div class="px-5 py-4 flex items-center justify-between border-b border-surface-3/50">
        <div class="flex items-center gap-3">
          <div class="w-11 h-11 rounded-2xl flex items-center justify-center text-white text-[12px] font-bold shadow-sm" style="background:${card.color}">${card.type==='Visa'?'V':'M'}</div>
          <div>
            <h3 class="font-bold text-ink-1 text-[15px]">${card.name}</h3>
            <p class="text-[11px] text-ink-4">${card.holder} · •••• ${card.last4} · ${card.type}</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          ${statusBadgeSmall(getCardStatus(cid).status)}
          ${!isAdmin?`<button onclick="event.stopPropagation();S.applyCard='${cid}';S.userTab='apply';render()"
            class="btn-apple text-[12px] font-semibold text-white bg-accent-500 hover:bg-accent-600 px-4 py-2 rounded-xl shadow-sm ml-1">신청</button>`:''}
        </div>
      </div>

      <!-- Month Nav -->
      <div class="px-5 py-3 flex items-center justify-between bg-surface-1/50">
        <button onclick="calPrev()" class="btn-apple p-2 rounded-xl hover:bg-surface-2 text-ink-3">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <h4 class="text-[15px] font-bold text-ink-1">${y}년 ${monthNames[m]}</h4>
        <button onclick="calNext()" class="btn-apple p-2 rounded-xl hover:bg-surface-2 text-ink-3">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>

      <!-- Calendar Grid -->
      <div class="px-3 sm:px-5 pb-4 pt-2">
        <div class="grid grid-cols-7 mb-1">
          ${dayNames.map((dn,i)=>`<div class="text-center text-[11px] font-semibold py-1.5 ${i===0?'text-red-400':i===6?'text-blue-400':'text-ink-4'}">${dn}</div>`).join('')}
        </div>
        <div class="grid grid-cols-7 gap-[3px]">${cells}</div>
        <div class="flex items-center gap-5 text-[11px] text-ink-4 mt-3 pt-3 border-t border-surface-3/40">
          <span class="flex items-center gap-1.5"><span class="w-3 h-2 rounded bg-accent-200/70"></span>승인됨</span>
          <span class="flex items-center gap-1.5"><span class="w-3 h-2 rounded bg-surface-3/70"></span>대기 중</span>
          <span class="flex items-center gap-1.5"><span class="w-5 h-5 rounded-full border border-accent-300 bg-accent-50 flex items-center justify-center text-[8px] font-bold text-accent-600">${today.getDate()}</span>오늘</span>
        </div>
      </div>
    </div>
    ${listHTML}
  </div>`;
}

// ── APPLY FORM ─────────────────────────────
function renderApply(){
  const cards=DB.get('cards');
  const now=new Date();
  const min=new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().slice(0,16);
  return`
  <div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl border border-surface-3/60 p-6 sm:p-7">
      <h2 class="text-[16px] font-bold text-ink-1 mb-1">카드 사용 신청</h2>
      <p class="text-[12px] text-ink-4 mb-6">사용할 카드와 일정, 목적을 입력해주세요.</p>
      <div class="space-y-4">
        <div>
          <label class="block text-[12px] font-semibold text-ink-3 mb-1.5 ml-0.5">카드 선택</label>
          <select id="a-card" class="w-full px-4 py-3 bg-surface-2 border-0 rounded-2xl text-[13px] font-medium focus:ring-2 focus:ring-accent-400 transition">
            ${cards.map(c=>`<option value="${c.id}" ${S.applyCard===c.id?'selected':''}>${c.name} (${c.holder}) · •••• ${c.last4}</option>`).join('')}
          </select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-[12px] font-semibold text-ink-3 mb-1.5 ml-0.5">시작 일시</label>
            <input id="a-start" type="datetime-local" min="${min}" class="w-full px-3 py-3 bg-surface-2 border-0 rounded-2xl text-[13px] focus:ring-2 focus:ring-accent-400 transition">
          </div>
          <div>
            <label class="block text-[12px] font-semibold text-ink-3 mb-1.5 ml-0.5">종료 일시</label>
            <input id="a-end" type="datetime-local" min="${min}" class="w-full px-3 py-3 bg-surface-2 border-0 rounded-2xl text-[13px] focus:ring-2 focus:ring-accent-400 transition">
          </div>
        </div>
        <div>
          <label class="block text-[12px] font-semibold text-ink-3 mb-1.5 ml-0.5">사용 목적</label>
          <textarea id="a-purpose" rows="3" placeholder="예: 거래처 미팅 식비, 출장 교통비 등"
            class="w-full px-4 py-3 bg-surface-2 border-0 rounded-2xl text-[13px] focus:ring-2 focus:ring-accent-400 transition resize-none placeholder:text-ink-5"></textarea>
        </div>
        <button onclick="submitApp()"
          class="btn-apple w-full bg-gradient-to-b from-accent-400 to-accent-500 hover:from-accent-500 hover:to-accent-600
          text-white font-bold py-3.5 rounded-2xl shadow-md shadow-accent-400/20 text-[14px]">
          신청서 제출
        </button>
      </div>
    </div>
  </div>`;
}

function submitApp(){
  const cid=$('#a-card').value,st=$('#a-start').value,en=$('#a-end').value,pu=$('#a-purpose').value.trim();
  if(!st||!en){toast('시작/종료 일시를 입력해주세요.','error');return}
  if(new Date(st)>=new Date(en)){toast('종료 시간은 시작 이후여야 합니다.','error');return}
  if(new Date(st)<new Date()){toast('시작 시간은 현재 이후여야 합니다.','error');return}
  if(!pu){toast('사용 목적을 입력해주세요.','error');return}
  if(hasConflict(cid,st,en)){toast('해당 시간에 이미 예약/대기가 있습니다.','error');return}
  const res=DB.get('reservations');
  res.push({id:'R'+Date.now(),cardId:cid,empId:S.user.empId,startTime:st,endTime:en,purpose:pu,status:'pending',createdAt:new Date().toISOString()});
  DB.set('reservations',res);
  S.applyCard=null;S.userTab='history';render();toast('신청이 완료되었습니다!');
}

// ── HISTORY ────────────────────────────────
function renderHistory(){
  const res=(DB.get('reservations')||[]).filter(r=>r.empId===S.user.empId);
  const cm={};(DB.get('cards')||[]).forEach(c=>cm[c.id]=c);
  if(!res.length)return`
    <div class="text-center py-20">
      <div class="w-14 h-14 bg-surface-2 rounded-2xl flex items-center justify-center mx-auto mb-3">
        <svg class="w-7 h-7 text-ink-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      </div>
      <p class="text-ink-4 font-medium text-[14px]">신청 내역이 없습니다</p>
      <button onclick="S.userTab='apply';render()" class="btn-apple mt-3 text-[13px] font-semibold text-accent-600">카드 신청하기 →</button>
    </div>`;
  const badge=s=>({pending:'<span class="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-amber-50 text-amber-600">대기 중</span>',approved:'<span class="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-600">승인됨</span>',rejected:'<span class="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-red-50 text-red-500">거절됨</span>'}[s]);
  return`<div class="space-y-2.5">${[...res].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(r=>{const c=cm[r.cardId];return`
    <div class="card-el bg-white rounded-2xl border border-surface-3/60 p-4">
      <div class="flex items-center justify-between mb-2.5">
        <div class="flex items-center gap-2.5">
          ${c?`<div class="w-7 h-7 rounded-lg flex items-center justify-center text-white text-[9px] font-bold" style="background:${c.color}">${c.type==='Visa'?'V':'M'}</div>`:''}
          <span class="font-bold text-ink-1 text-[13px]">${c?c.name:r.cardId}</span>
          ${c?`<span class="text-[11px] text-ink-4">•••• ${c.last4}</span>`:''}
        </div>
        ${badge(r.status)}
      </div>
      <div class="grid grid-cols-2 gap-2 text-[11px] text-ink-3 mb-2">
        <div><span class="text-ink-4">시작</span><p class="font-medium mt-0.5">${fmtFull(r.startTime)}</p></div>
        <div><span class="text-ink-4">종료</span><p class="font-medium mt-0.5">${fmtFull(r.endTime)}</p></div>
      </div>
      <p class="text-[11px] text-ink-4 pt-2 border-t border-surface-3/50"><span class="text-ink-5">목적:</span> ${r.purpose}</p>
      ${r.status==='pending'?`<button onclick="cancelRes('${r.id}')" class="btn-apple mt-2 text-[11px] font-semibold text-red-500 hover:text-red-600">신청 취소</button>`:''}
    </div>`}).join('')}</div>`;
}
function cancelRes(id){DB.set('reservations',(DB.get('reservations')||[]).filter(x=>x.id!==id));render();toast('신청이 취소되었습니다.','info')}

// ═══════════════════════════════════════════
//  ADMIN VIEW
// ═══════════════════════════════════════════
function renderAdmin(){
  const tabs=[
    {k:'requests',l:'신청 관리',ico:'<svg class="w-[15px] h-[15px]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>'},
    {k:'cards',l:'카드 현황',ico:'<svg class="w-[15px] h-[15px]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>'},
  ];
  let content='';
  if(S.adminTab==='requests')content=renderAdminReq();
  else content=S.calendarCard?renderCalendar(S.calendarCard):renderAdminCards();

  app().innerHTML=`${hdr()}
  <main class="max-w-5xl mx-auto px-5 py-5 fade-in">
    <nav class="flex gap-1 bg-surface-2 rounded-2xl p-1 mb-5">
      ${tabs.map(t=>`<button onclick="S.adminTab='${t.k}';S.calendarCard=null;render()"
        class="btn-apple flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-xl text-[13px] font-semibold
        ${S.adminTab===t.k?'bg-white text-ink-1 shadow-sm':'text-ink-3 hover:text-ink-2'}">${t.ico}${t.l}</button>`).join('')}
    </nav>
    <div class="slide-up">${content}</div>
  </main>`;
}

function renderAdminCards(){
  const cards=DB.get('cards');
  return`<div class="grid gap-3 sm:grid-cols-2">${cards.map(c=>{
    const cs=getCardStatus(c.id);
    const allRes=(DB.get('reservations')||[]).filter(r=>r.cardId===c.id&&(r.status==='approved'||r.status==='pending'));
    const ac=allRes.filter(r=>r.status==='approved').length,pc=allRes.filter(r=>r.status==='pending').length;
    let sub='';
    if(cs.r){sub=`<p class="text-[11px] text-ink-4 mt-2 pt-2 border-t border-surface-3"><span class="font-semibold text-ink-3">${getUserName(cs.r.empId)}</span> · ${fmtDT(cs.r.startTime)}~${fmtDT(cs.r.endTime)}</p>`}
    return`
    <div class="card-el bg-white rounded-2xl border border-surface-3/60 p-5 cursor-pointer" onclick="openCal('${c.id}')">
      <div class="flex items-start justify-between mb-3">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-2xl flex items-center justify-center text-white text-[11px] font-bold shadow-sm" style="background:${c.color}">${c.type==='Visa'?'V':'M'}</div>
          <div><h3 class="font-bold text-ink-1 text-[14px]">${c.name}</h3><p class="text-[11px] text-ink-4">${c.holder} · •••• ${c.last4}</p></div>
        </div>
        ${statusBadgeSmall(cs.status)}
      </div>
      ${sub}
      <div class="flex items-center justify-between mt-3 pt-3 border-t border-surface-3/50">
        <div class="flex gap-3 text-[11px]">
          <span class="text-emerald-600 font-semibold">${ac}건 승인</span>
          ${pc?`<span class="text-amber-600 font-semibold">${pc}건 대기</span>`:''}
        </div>
        <span class="text-[11px] text-ink-4 flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          달력 보기
        </span>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderAdminReq(){
  const res=DB.get('reservations')||[],cards=DB.get('cards'),users=DB.get('users')||{};
  const cm={};cards.forEach(c=>cm[c.id]=c);
  const cnt={pending:0,approved:0,rejected:0};res.forEach(r=>cnt[r.status]++);
  const sorted=[...res].sort((a,b)=>{const o={pending:0,approved:1,rejected:2};return o[a.status]!==o[b.status]?o[a.status]-o[b.status]:new Date(b.createdAt)-new Date(a.createdAt)});
  const badge=s=>({pending:'<span class="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-amber-50 text-amber-600">대기 중</span>',approved:'<span class="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-600">승인됨</span>',rejected:'<span class="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-red-50 text-red-500">거절됨</span>'}[s]);
  return`
  <div class="grid grid-cols-3 gap-3 mb-5">
    <div class="bg-white rounded-2xl border border-surface-3/60 p-4 text-center card-el">
      <p class="text-[28px] font-extrabold text-amber-500">${cnt.pending}</p>
      <p class="text-[11px] text-ink-4 font-medium mt-0.5">대기 중</p>
    </div>
    <div class="bg-white rounded-2xl border border-surface-3/60 p-4 text-center card-el">
      <p class="text-[28px] font-extrabold text-emerald-500">${cnt.approved}</p>
      <p class="text-[11px] text-ink-4 font-medium mt-0.5">승인됨</p>
    </div>
    <div class="bg-white rounded-2xl border border-surface-3/60 p-4 text-center card-el">
      <p class="text-[28px] font-extrabold text-red-400">${cnt.rejected}</p>
      <p class="text-[11px] text-ink-4 font-medium mt-0.5">거절됨</p>
    </div>
  </div>
  ${!sorted.length?`<div class="text-center py-20 bg-white rounded-2xl border border-surface-3/60"><p class="text-ink-4 font-medium">접수된 신청이 없습니다</p></div>`:`
  <div class="space-y-2.5">${sorted.map(r=>{const c=cm[r.cardId],u=users[r.empId];return`
    <div class="card-el bg-white rounded-2xl border border-surface-3/60 p-4 ${r.status==='pending'?'border-l-[3px] border-l-accent-400':''}">
      <div class="flex items-start justify-between mb-2.5">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-accent-100 text-accent-700 flex items-center justify-center text-[12px] font-bold shrink-0">${(u?.name||'?')[0]}</div>
          <div>
            <p class="font-bold text-ink-1 text-[13px]">${u?.name||r.empId} <span class="font-normal text-ink-4 text-[11px]">${u?.dept||''}</span></p>
            <div class="flex items-center gap-1.5 mt-0.5">
              ${c?`<div class="w-3.5 h-3.5 rounded flex items-center justify-center text-white text-[7px] font-bold" style="background:${c.color}">${c.type==='Visa'?'V':'M'}</div>`:''}
              <p class="text-[11px] text-ink-4">${c?c.name+' · •••• '+c.last4:r.cardId}</p>
            </div>
          </div>
        </div>
        ${badge(r.status)}
      </div>
      <div class="grid grid-cols-2 gap-2 text-[11px] text-ink-3 mb-2">
        <div><span class="text-ink-4">시작</span><p class="font-medium mt-0.5">${fmtFull(r.startTime)}</p></div>
        <div><span class="text-ink-4">종료</span><p class="font-medium mt-0.5">${fmtFull(r.endTime)}</p></div>
      </div>
      <p class="text-[11px] text-ink-4 pb-2.5 border-b border-surface-3/50"><span class="text-ink-5">목적:</span> ${r.purpose}</p>
      <div class="flex items-center justify-between mt-2.5">
        <span class="text-[10px] text-ink-5">${fmtFull(r.createdAt)}</span>
        ${r.status==='pending'?`
          <div class="flex gap-2">
            <button onclick="adminAct('${r.id}','rejected')" class="btn-apple text-[12px] font-semibold text-red-500 hover:bg-red-50 border border-red-200 px-4 py-1.5 rounded-xl transition">거절</button>
            <button onclick="adminAct('${r.id}','approved')" class="btn-apple text-[12px] font-semibold text-white bg-gradient-to-b from-accent-400 to-accent-500 px-4 py-1.5 rounded-xl shadow-sm transition">승인</button>
          </div>`:''}
      </div>
    </div>`}).join('')}</div>`}`;
}

function adminAct(id,action){
  const res=DB.get('reservations'),r=res.find(x=>x.id===id);
  if(!r)return;
  if(action==='approved'&&hasConflict(r.cardId,r.startTime,r.endTime,id)){toast('해당 시간대에 이미 승인된 예약이 있습니다.','error');return}
  r.status=action;DB.set('reservations',res);render();
  toast(action==='approved'?'승인되었습니다.':'거절되었습니다.',action==='approved'?'success':'info');
}

// ── INIT ──
render();
</script>
</body>
</html>
